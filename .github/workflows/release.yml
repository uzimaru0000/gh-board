name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-13
            name: darwin_amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: darwin_arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux_amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux_arm64
            use_cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: windows_amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Download schema (for cross build)
        if: matrix.use_cross
        run: |
          COMMIT=$(grep 'commit' Cargo.toml | tail -1 | sed 's/.*"\(.*\)"/\1/')
          gh api "/repos/octokit/graphql-schema/contents/schema.graphql?ref=${COMMIT}" \
            -H "Accept: application/vnd.github.raw+json" > schema.graphql
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: tar czf gh-board_${{ matrix.name }}.tar.gz -C target/${{ matrix.target }}/release gh-board

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../gh-board_${{ matrix.name }}.zip gh-board.exe

      - uses: actions/upload-artifact@v4
        with:
          name: gh-board_${{ matrix.name }}
          path: gh-board_${{ matrix.name }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: gh-board_*
          generate_release_notes: true
