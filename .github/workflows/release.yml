name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: darwin-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset: linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            asset: linux-arm64
            use_cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset: windows-amd64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Download schema (for cross build)
        if: matrix.use_cross
        run: |
          COMMIT=$(grep 'commit' Cargo.toml | tail -1 | sed 's/.*"\(.*\)"/\1/')
          gh api "/repos/octokit/graphql-schema/contents/schema.graphql?ref=${COMMIT}" \
            -H "Accept: application/vnd.github.raw+json" > schema.graphql
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Rename binary (unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/gh-board ${{ matrix.asset }}

      - name: Rename binary (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: cp target/${{ matrix.target }}/release/gh-board.exe ${{ matrix.asset }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            darwin-arm64
            linux-amd64
            linux-arm64
            windows-amd64.exe
          generate_release_notes: true
