name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Test
        run: cargo test

      - name: Clippy
        run: cargo clippy -- -D warnings
