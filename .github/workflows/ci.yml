name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Add clippy component
        run: rustup component add clippy

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Test
        run: cargo test

      - name: Clippy
        run: cargo clippy -- -D warnings
