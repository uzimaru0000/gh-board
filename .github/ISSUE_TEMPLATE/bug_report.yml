name: 🐛 Bug report
description: Report a bug in gh-board
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Run `gh board <num>`
        2. Press ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include screenshots, terminal output, or error messages if possible.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: gh-board version
      description: Output of `gh board --version`
      placeholder: "1.2.0"
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: Environment
      description: OS, terminal emulator, shell
      placeholder: "macOS 14.5, WezTerm, fish"
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Relevant config (optional)
      description: Snippet from `~/.config/gh-board/config.toml` or `theme.toml` if related.
      render: toml
