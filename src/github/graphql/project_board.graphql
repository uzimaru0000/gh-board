query ProjectBoard($projectId: ID!, $itemsCursor: String, $query: String) {
  node(id: $projectId) {
    __typename
    ... on ProjectV2 {
      title
      repositories(first: 20) {
        nodes {
          id
          nameWithOwner
        }
      }
      fields(first: 50) {
        nodes {
          __typename
          ... on ProjectV2SingleSelectField {
            id
            name
            options {
              id
              name
              color
            }
          }
          ... on ProjectV2Field {
            id
            name
            dataType
          }
          ... on ProjectV2IterationField {
            id
            name
            configuration {
              iterations {
                id
                title
                startDate
              }
            }
          }
        }
      }
      items(first: 50, after: $itemsCursor, query: $query) {
        pageInfo { hasNextPage endCursor }
        nodes {
          id
          fieldValues(first: 20) {
            nodes {
              __typename
              ... on ProjectV2ItemFieldSingleSelectValue {
                name
                optionId
                field {
                  __typename
                  ... on ProjectV2SingleSelectField { id name }
                }
              }
              ... on ProjectV2ItemFieldTextValue {
                text
                field {
                  __typename
                  ... on ProjectV2Field { id name }
                }
              }
              ... on ProjectV2ItemFieldNumberValue {
                number
                field {
                  __typename
                  ... on ProjectV2Field { id name }
                }
              }
              ... on ProjectV2ItemFieldDateValue {
                date
                field {
                  __typename
                  ... on ProjectV2Field { id name }
                }
              }
              ... on ProjectV2ItemFieldIterationValue {
                title
                iterationId
                field {
                  __typename
                  ... on ProjectV2IterationField { id name }
                }
              }
            }
          }
          content {
            __typename
            ... on Issue {
              id
              title
              number
              state
              url
              body
              milestone { title }
              assignees(first: 5) { nodes { login } }
              labels(first: 10) { nodes { id name color } }
              reactionGroups {
                content
                viewerHasReacted
                reactors { totalCount }
              }
              comments(first: 20) {
                nodes {
                  id
                  author { __typename login }
                  body
                  createdAt
                  reactionGroups {
                    content
                    viewerHasReacted
                    reactors { totalCount }
                  }
                }
              }
              closedByPullRequestsReferences(first: 10, includeClosedPrs: true) {
                nodes {
                  number
                  title
                  url
                  state
                }
              }
            }
            ... on PullRequest {
              id
              title
              number
              state
              url
              body
              milestone { title }
              assignees(first: 5) { nodes { login } }
              labels(first: 10) { nodes { id name color } }
              reactionGroups {
                content
                viewerHasReacted
                reactors { totalCount }
              }
              comments(first: 20) {
                nodes {
                  id
                  author { __typename login }
                  body
                  createdAt
                  reactionGroups {
                    content
                    viewerHasReacted
                    reactors { totalCount }
                  }
                }
              }
              reviewDecision
              reviewRequests(first: 10) {
                nodes {
                  requestedReviewer {
                    __typename
                    ... on User { login }
                    ... on Team { name }
                  }
                }
              }
              commits(last: 1) {
                nodes {
                  commit {
                    statusCheckRollup { state }
                  }
                }
              }
            }
            ... on DraftIssue {
              id
              title
              body
            }
          }
        }
      }
    }
  }
}
