mutation AddComment($subjectId: ID!, $body: String!) {
  addComment(input: { subjectId: $subjectId, body: $body }) {
    commentEdge {
      node {
        id
        author { __typename login }
        body
        createdAt
        reactionGroups {
          content
          viewerHasReacted
          reactors { totalCount }
        }
      }
    }
  }
}
